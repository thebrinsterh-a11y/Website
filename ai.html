<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brinley's Tic Tac Toe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 40px;
    }
    h1 { margin-bottom: 10px; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      margin: 20px 0;
    }
    .cell {
      width: 100px;
      height: 100px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
    }
    .controls {
      margin: 10px;
    }
    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Brinley's Tic Tac Toe</h1>

<div class="controls">
  Choose your side:
  <button onclick="setPlayer('X')">Play as X</button>
  <button onclick="setPlayer('O')">Play as O</button>
</div>

<div>Score - You: <span id="playerScore">0</span> | Computer: <span id="computerScore">0</span></div>

<div class="board" id="board"></div>

<div id="status"></div>

<script>
  let board = Array(9).fill('');
  let player = '';
  let computer = '';
  let currentTurn = 'X';
  let gameActive = false;
  let playerScore = 0;
  let computerScore = 0;

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');

  function setPlayer(choice) {
    player = choice;
    computer = choice === 'X' ? 'O' : 'X';
    resetBoard();
    gameActive = true;
    statusEl.textContent = "Game started!";

    if (computer === 'X') computerMove();
  }

  function createBoard() {
    boardEl.innerHTML = '';
    board.forEach((cell, i) => {
      const div = document.createElement('div');
      div.classList.add('cell');
      div.textContent = cell;
      div.onclick = () => handleClick(i);
      boardEl.appendChild(div);
    });
  }

  function handleClick(index) {
    if (!gameActive || board[index] !== '' || currentTurn !== player) return;

    board[index] = player;
    currentTurn = computer;
    update();

    if (checkGameEnd()) return;

    setTimeout(computerMove, 500);
  }

  function computerMove() {
    let empty = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
    let move = empty[Math.floor(Math.random() * empty.length)];

    if (move !== undefined) {
      board[move] = computer;
      currentTurn = player;
      update();
      checkGameEnd();
    }
  }

  function update() {
    createBoard();
  }

  function checkWinner() {
    const wins = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    for (let combo of wins) {
      const [a,b,c] = combo;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return board[a];
      }
    }
    return null;
  }

  function checkGameEnd() {
    let winner = checkWinner();

    if (winner) {
      gameActive = false;
      if (winner === player) {
        playerScore++;
        document.getElementById('playerScore').textContent = playerScore;
        statusEl.textContent = "You win!";
      } else {
        computerScore++;
        document.getElementById('computerScore').textContent = computerScore;
        statusEl.textContent = "Computer wins!";
      }
      setTimeout(resetBoard, 1000);
      return true;
    }

    if (!board.includes('')) {
      gameActive = false;
      statusEl.textContent = "It's a tie!";
      setTimeout(resetBoard, 1000);
      return true;
    }

    return false;
  }

  function resetBoard() {
    board = Array(9).fill('');
    currentTurn = 'X';
    gameActive = !!player;
    createBoard();
    if (player && computer === 'X') computerMove();
  }

  createBoard();
</script>

</body>
</html>
